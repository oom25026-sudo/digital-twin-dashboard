<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioMotion - Mobile Sensor Transmitter</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f172a; color: #f8fafc; text-align: center; margin: 0; padding: 25px;
        }
        .container { border: 1px solid #334155; background: #1e293b; padding: 30px 20px; border-radius: 16px; margin-top: 30px; }
        .trigger-btn {
            background-color: #38bdf8; color: #0f172a; font-size: 16px; font-weight: bold; border: none;
            padding: 16px 32px; border-radius: 30px; cursor: pointer; width: 100%; margin-top: 15px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
        }
        .data-title { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-top: 15px; font-weight: bold; }
        .data-value { font-size: 22px; font-weight: bold; color: #38bdf8; margin-bottom: 2px; }
    </style>
</head>
<body>

<h2>📲 ตัวส่งเซนเซอร์ชีวกลศาสตร์</h2>
<p style="color:#94a3b8; font-size: 13px;">ส่งสัญญาณวัดมุมโครงร่างและแรงกระแทกความเร่ง</p>

<div class="container">
    <button id="btnGrant">🔘 เปิดระบบสตรีมข้อมูลความเร็วสูง</button>
    
    <div style="margin-top: 25px; border-top: 1px solid #334155; padding-top: 15px;">
        <div class="data-title">พิกัดมุมองศา (Pitch)</div>
        <div id="txtPitch" class="data-value">0.0°</div>
        
        <div class="data-title">ค่าแรงความเร่งแกน X (Accel X)</div>
        <div id="txtAx" class="data-value">0.00</div>
        
        <div id="txtStatus" style="color:#94a3b8; font-size:12px; margin-top:20px;">สถานะ: รอกระตุ้นสัญญาณพิกัด</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://llllllll-3c932-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ตัวแปรเก็บค่าเซนเซอร์เพื่อแชร์กันส่งในก้อนเดียว
    let currentOrientation = { roll: 0, pitch: 0, yaw: 0 };
    let currentMotion = { ax: 0, ay: 0, az: 0 };
    let streamInterval;

    document.getElementById("btnGrant").onclick = () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') { activateSensors(); } else { alert("กรุณาเปิดสิทธิ์การใช้งานเซนเซอร์"); }
            });
        } else {
            activateSensors();
        }
    };

    function activateSensors() {
        document.getElementById("btnGrant").style.display = "none";
        document.getElementById("txtStatus").textContent = "● กำลังสตรีมมิ่งทั้ง 3 ค่าหลักขึ้นสู่คลาวด์...";
        document.getElementById("txtStatus").style.color = "#4ade80";

        // ดักฟังค่าพิกัดความเอียง (Orientation)
        window.addEventListener("deviceorientation", (e) => {
            currentOrientation.roll = e.gamma || 0;
            currentOrientation.pitch = e.beta || 0;
            currentOrientation.yaw = e.alpha || 0;
            document.getElementById("txtPitch").textContent = currentOrientation.pitch.toFixed(1) + "°";
        });

        // ดักฟังค่าความเร่งเคลื่อนไหว (Accelerometer)
        window.addEventListener("devicemotion", (e) => {
            const acc = e.accelerationIncludingGravity;
            if (acc) {
                currentMotion.ax = acc.x || 0;
                currentMotion.ay = acc.y || 0;
                currentMotion.az = acc.z || 0;
                document.getElementById("txtAx").textContent = currentMotion.ax.toFixed(2);
            }
        });

        // ส่งข้อมูลทั้ง 3 ส่วนหลักขึ้น Firebase ในรูปแบบ Payload ชุดเดียวกันอย่างเป็นระเบียบถี่ถ้วน
        streamInterval = setInterval(() => {
            db.ref("sensor/live_payload").set({
                pitch: currentOrientation.pitch,
                roll: currentOrientation.roll,
                yaw: currentOrientation.yaw,
                ax: currentMotion.ax,
                ay: currentMotion.ay,
                az: currentMotion.az,
                timestamp: Date.now()
            });
        }, 50); // ส่งทุก ๆ 50ms เพื่อคงระดับความเรียลไทม์สูงสุด
    }
</script>
</body>
</html>
