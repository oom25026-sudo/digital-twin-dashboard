<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMotion - Sensor Transmitter</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a; color: #f8fafc; text-align: center; padding: 30px 15px; margin: 0;
        }
        .status-card {
            background: #1e293b; border-radius: 16px; padding: 25px; border: 1px solid #334155; margin-bottom: 20px;
        }
        .title { color: #38bdf8; font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        .data-box { background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #1e293b; }
        .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .val { font-size: 28px; font-weight: bold; color: #f1f5f9; }
        .btn-permission {
            background: #38bdf8; color: #0f172a; border: none; padding: 15px 30px;
            border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; display: none; width: 100%;
        }
        .indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: #ef4444; margin-right: 8px; }
        .active { background: #4ade80; box-shadow: 0 0 10px #4ade80; }
    </style>
</head>
<body>

    <div class="status-card">
        <div class="title">📲 ตัวส่งสัญญาณเซนเซอร์</div>
        <div class="subtitle">BioMotion Mobile Node</div>
        
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
            <span id="syncIndicator" class="indicator"></span>
            <span id="syncStatus" style="font-size: 14px; color: #94a3b8;">กำลังตัดการเชื่อมต่อ</span>
        </div>

        <button id="btnGrant" class="btn-permission">🔑 อนุญาตใช้งาน Gyroscope / Motion</button>

        <div class="data-box">
            <div class="label">องศาแนวตั้ง (Pitch)</div>
            <div id="valPitch" class="val">0.0°</div>
        </div>
        
        <div class="data-box">
            <div class="label">องศาแนวนอน (Roll)</div>
            <div id="valRoll" class="val">0.0°</div>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://llllllll-3c932-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const syncIndicator = document.getElementById("syncIndicator");
    const syncStatus = document.getElementById("syncStatus");
    const btnGrant = document.getElementById("btnGrant");

    function initSensorStream() {
        window.addEventListener('deviceorientation', (event) => {
            // คำนวณ Mapping ให้ตรงกับรูปแบบระนาบโครงสร้างเว็บแผงควบคุมหลัก
            let pitch = event.beta;  // ก้ม-เงย (-180 ถึง 180)
            let roll = event.gamma;  // เอียงซ้าย-ขวา (-90 ถึง 90)
            let yaw = event.alpha;   // ทิศทางหัวลูกศร (0 ถึง 360)

            if (pitch !== null && roll !== null) {
                // อัปเดตข้อมูลขึ้นไปยัง Node หลักบน Firebase เพื่อส่งต่อแดชบอร์ดคอมฯ
                db.ref("sensor/live_payload").set({
                    pitch: parseFloat(pitch),
                    roll: parseFloat(roll),
                    yaw: parseFloat(yaw || 0),
                    timestamp: Date.now()
                });

                document.getElementById("valPitch").textContent = pitch.toFixed(1) + "°";
                document.getElementById("valRoll").textContent = roll.toFixed(1) + "°";
                
                syncIndicator.classList.add("active");
                syncStatus.textContent = "เชื่อมต่อระบบส่งข้อมูลสดแล้ว";
                syncStatus.style.color = "#4ade80";
            }
        });
    }

    // รองรับเงื่อนไขความปลอดภัยและสิทธิ์การเข้าถึงบนระบบ iOS 13+
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        btnGrant.style.display = "block";
        btnGrant.onclick = () => {
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        btnGrant.style.display = "none";
                        initSensorStream();
                    } else {
                        alert('ระบบไม่ได้รับอนุญาตให้ใช้เซนเซอร์วัดความเอียงเครื่อง');
                    }
                })
                .catch(console.error);
        };
    } else {
        // หากเป็น Android หรือบราวเซอร์ทั่วไปสามารถรันสตรีมส่งค่าได้ทันที
        initSensorStream();
    }
</script>
</body>
</html>
