<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BioMotion - Mobile Sensor Transmitter</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            margin: 0;
            padding: 25px;
        }
        .container {
            border: 1px solid #334155;
            background: #1e293b;
            padding: 30px 20px;
            border-radius: 16px;
            margin-top: 40px;
        }
        .trigger-btn {
            background-color: #38bdf8;
            color: #0f172a;
            font-size: 16px;
            font-weight: bold;
            border: none;
            padding: 16px 32px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .monitor-label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 15px;
        }
        .monitor-value {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<h2>ตัวขับเคลื่อนสัญญาณไร้สาย</h2>
<p style="color:#94a3b8; font-size: 14px;">เชื่อมระบบเซนเซอร์วัดค่าความเที่ยงตรง</p>

<div class="container">
    <div style="font-size: 14px; margin-bottom: 5px;">โหมดควบคุมจาก PC ปัจจุบัน:</div>
    <div id="lblCurrentMode" style="color:#4ade80; font-weight:bold; font-size:16px;">กำลังตรวจสอบ...</div>

    <button id="btnGrant" class="trigger-btn">เปิดระบบยิงพิกัดองศา</button>
    
    <div style="margin-top: 30px; border-top: 1px solid #334155; padding-top: 20px;">
        <div class="monitor-label">องศาก้มเงย (Pitch)</div>
        <div id="txtX" class="monitor-value">0.0°</div>
        
        <div class="monitor-label">สถานะพิกัดเครือข่าย</div>
        <div id="txtStatus" style="color:#94a3b8; font-size:13px;">พร้อมใช้งานสแตนด์บาย</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://llllllll-3c932-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let targetValidationMode = "accuracy";

    // ตรวจจับฟังว่าผู้ใช้งานคลิกเลือกตรวจสอบอะไรจากฝั่ง Dashboard PC
    db.ref("system/currentValidationMode").on("value", (snapshot) => {
        const mode = snapshot.val();
        if(mode) {
            targetValidationMode = mode;
            document.getElementById("lblCurrentMode").textContent = mode.toUpperCase() + " Mode";
        }
    });

    document.getElementById("btnGrant").onclick = () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') {
                        initStreaming();
                        document.getElementById("btnGrant").style.display = "none";
                    } else {
                        alert("โปรดอนุญาตสิทธิ์การเข้าถึงอุปกรณ์");
                    }
                });
        } else {
            initStreaming();
            document.getElementById("btnGrant").style.display = "none";
        }
    };

    function initStreaming() {
        document.getElementById("txtStatus").textContent = "● กำลังส่งออกข้อมูลแบบเรียลไทม์";
        document.getElementById("txtStatus").style.color = "#4ade80";

        window.addEventListener("deviceorientation", (e) => {
            let p = e.beta || 0;
            let r = e.gamma || 0;
            let y = e.alpha || 0;

            document.getElementById("txtX").textContent = p.toFixed(1) + "°";

            // ยิงชุดแพ็กเก็ตขึ้นเพื่อไปเข้ากระบวนการวิเคราะห์ความน่าเชื่อถือฝั่งรับ
            db.ref("sensor/live_data").set({
                pitch: parseFloat(p.toFixed(2)),
                roll: parseFloat(r.toFixed(2)),
                yaw: parseFloat(y.toFixed(2)),
                timestamp: Date.now()
            });
        });
    }
</script>
</body>
</html>
