<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMotion - Phone Sensor Node</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 30px 20px;
            margin: 0;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .title { color: #38bdf8; font-size: 22px; margin-bottom: 5px; font-weight: bold; }
        .status-card {
            background-color: #1e293b; border: 1px solid #334155;
            border-radius: 12px; padding: 20px; margin: 20px 0;
        }
        .btn-grant {
            background-color: #38bdf8; color: #0f172a; border: none;
            padding: 15px 30px; font-size: 16px; font-weight: bold;
            border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 15px;
        }
        /* ปุ่มควบคุมแบบซิงค์ข้ามฝั่ง */
        .btn-control {
            color: white; border: none; padding: 15px 30px; font-size: 16px; 
            font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%;
            transition: background-color 0.2s ease;
        }
        .val-display { font-size: 18px; font-weight: bold; margin: 10px 0; color: #cbd5e1; }
        .label { color: #94a3b8; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="title">📱 BioMotion Sensor Transmitter</div>
    <p style="color: #94a3b8; font-size: 14px;">โหมดจำลองยิงพิกัดข้อต่อแบบเคลื่อนไหวเรียลไทม์</p>

    <div class="status-card">
        <button id="btnPermission" class="btn-grant">🔓 อนุญาตสิทธิ์เซนเซอร์การเคลื่อนไหว</button>
        <button id="btnSyncControl" class="btn-control" style="background-color: #22c55e;">▶ เริ่มบันทึกค่า (จากมือถือ)</button>
    </div>

    <div class="status-card">
        <div class="val-display">Pitch: <span id="valPitch" style="color:#4ade80">0.0°</span></div>
        <div class="val-display">Roll: <span id="valRoll" style="color:#fbbf24">0.0°</span></div>
        <div class="val-display">Yaw: <span id="valYaw" style="color:#38bdf8">0.0°</span></div>
    </div>

    <div class="label" id="pktStatus">สถานะ: กำลังรอสิทธิ์การเข้าถึงอุปกรณ์...</div>
</div>

<script>
    const firebaseConfig = {
        databaseURL: "https://llllllll-3c932-default-rtdb.asia-southeast1.firebasedatabase.app/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let motionData = { pitch: 0, roll: 0, yaw: 0, ax: 0, ay: 0, az: 0 };
    let isGlobalRecording = false;

    const btnSyncControl = document.getElementById("btnSyncControl");

    // 🌐 ตรวจจับการเปลี่ยนแปลงปุ่มจาก Firebase เพื่อเปลี่ยนดีไซน์ปุ่มบนมือถือตามกัน
    db.ref("system/isRecording").on("value", (snapshot) => {
        const remoteState = snapshot.val();
        if (remoteState === null) return;

        isGlobalRecording = remoteState;
        if (isGlobalRecording) {
            btnSyncControl.textContent = "⏸ พักการตรวจค่า (คอม/มือถือหยุดค้าง)";
            btnSyncControl.style.backgroundColor = "#ef4444"; // สีแดง
        } else {
            btnSyncControl.textContent = "▶ บันทึกต่อ (คอม/มือถือทำงานต่อ)";
            btnSyncControl.style.backgroundColor = "#fbbf24"; // สีเหลือง
        }
    });

    // เมื่อกดคลิกที่มือถือ -> อัปเดตบอกฐานข้อมูล ส่งสัญญาณกลับไปเปลี่ยนที่หน้าจอคอม
    btnSyncControl.onclick = () => {
        db.ref("system/isRecording").set(!isGlobalRecording);
    };

    document.getElementById("btnPermission").onclick = function() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission()
                .then(response => {
                    if (response === 'granted') { initSensors(); } else { alert('สิทธิ์การใช้งานถูกปฏิเสธ'); }
                }).catch(console.error);
        } else {
            initSensors();
        }
    };

    function initSensors() {
        document.getElementById("btnPermission").style.display = "none";
        document.getElementById("pktStatus").textContent = "● กำลังส่งพิกัดข้อมูลเซนเซอร์...";

        window.addEventListener('deviceorientation', (e) => {
            motionData.pitch = e.beta || 0;
            motionData.roll = e.gamma || 0;
            motionData.yaw = e.alpha || 0;

            document.getElementById("valPitch").textContent = motionData.pitch.toFixed(1) + "°";
            document.getElementById("valRoll").textContent = motionData.roll.toFixed(1) + "°";
            document.getElementById("valYaw").textContent = motionData.yaw.toFixed(1) + "°";

            sendPayload();
        });

        window.addEventListener('devicemotion', (e) => {
            let acc = e.accelerationIncludingGravity || { x: 0, y: 0, z: 0 };
            motionData.ax = acc.x || 0;
            motionData.ay = acc.y || 0;
            motionData.az = acc.z || 0;
        });
    }

    function sendPayload() {
        // อัปเดตแพ็กเก็ตส่งไปยังคลาวด์ต่อเนื่องเรียลไทม์
        db.ref("sensor/live_payload").set({
            pitch: motionData.pitch,
            roll: motionData.roll,
            yaw: motionData.yaw,
            ax: motionData.ax,
            ay: motionData.ay,
            az: motionData.az,
            timestamp: Date.now()
        });
    }
</script>
</body>
</html>
