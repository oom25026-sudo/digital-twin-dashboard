<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioMotion - Transmitter Client</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0; 
        }
        .transmitter-card { 
            background: #1e293b; 
            border-radius: 16px; 
            padding: 30px 20px; 
            border: 1px solid #334155; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        .title { 
            color: #38bdf8; 
            font-size: 22px; 
            font-weight: bold; 
        }
        .indicator-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            display: inline-block; 
            background: #ef4444; 
            margin-right: 8px; 
        }
        .indicator-dot.active { 
            background: #4ade80; 
            box-shadow: 0 0 10px #4ade80; 
        }
        .action-btn {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 16px 20px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 16px;
            display: block;
            width: 100%;
            margin-top: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .btn-permission { 
            background: #a855f7; 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%; 
            margin-bottom: 15px; 
            display: none; 
        }
    </style>
</head>
<body>

    <div class="transmitter-card">
        <div class="title">🏥 Clinical Motion Twin - Bio-Validation & Assessment System</div>
        <div style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">ฝั่งอุปกรณ์ส่งสัญญาณเซนเซอร์เคลื่อนไหว</div>
        
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 15px;">
            <span id="syncDot" class="indicator-dot"></span>
            <span id="syncText" style="font-size: 14px; color: #94a3b8;">รอสตรีมพิกัดองศา...</span>
        </div>

        <button id="btnPermission" class="btn-permission">🔑 ยินยอมให้แอปเข้าถึงตัววัดความเอียง (Gyroscope)</button>

        <button id="btnControl" class="action-btn">• เริ่มการทดสอบ</button>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://llllllll-3c932-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const syncDot = document.getElementById("syncDot");
    const syncText = document.getElementById("syncText");
    const btnPermission = document.getElementById("btnPermission");
    const btnControl = document.getElementById("btnControl");

    let isRecording = false;

    // ดักฟังสถานะปุ่มและปรับเอฟเฟกต์ตาม Firebase แบบ Realtime
    db.ref("system/isRecording").on("value", (snapshot) => {
        isRecording = snapshot.val() || false;
        if (isRecording) {
            btnControl.textContent = "⏸ หยุดค้างค่าการตรวจ";
            btnControl.style.backgroundColor = "#0ea5e9";
            btnControl.style.color = "#ffffff";
        } else {
            btnControl.textContent = "• เริ่มการทดสอบ";
            btnControl.style.backgroundColor = "#38bdf8";
            btnControl.style.color = "#0f172a";
        }
    });

    btnControl.onclick = () => {
        db.ref("system/isRecording").set(!isRecording);
    };

    function startStreaming() {
        window.addEventListener('deviceorientation', (event) => {
            let pVal = event.beta || 0;  
            let rVal = event.gamma || 0; 
            let yVal = event.alpha || 0; 

            db.ref("sensor/live_payload").set({
                pitch: parseFloat(pVal),
                roll: parseFloat(rVal),
                yaw: parseFloat(yVal),
                timestamp: Date.now()
            });
            
            syncDot.classList.add("active");
            syncText.textContent = "เชื่อมต่อและกำลังส่งข้อมูลสด";
            syncText.style.color = "#4ade80";
        });
    }

    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        btnPermission.style.display = "block";
        btnPermission.onclick = () => {
            DeviceOrientationEvent.requestPermission()
                .then(state => {
                    if (state === 'granted') {
                        btnPermission.style.display = "none";
                        startStreaming();
                    } else {
                        alert('แอปพลิเคชันไม่สามารถดึงค่าองศาเอียงได้หากไม่ได้รับอนุญาตครับ');
                    }
                }).catch(console.error);
        };
    } else {
        startStreaming();
    }
</script>
</body>
</html>
